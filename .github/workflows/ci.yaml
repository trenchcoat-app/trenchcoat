name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tidy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: checkout repo
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: install root dependencies
        run: npm install
        working-directory: .

      - name: install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: ensure output directories exist
        run: mkdir -p internal/api

      - name: generate code
        run: npm run codegen
        working-directory: .

      - name: run go mod tidy
        run: go mod tidy

      - name: check for diff
        run: |
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the changes."
            git diff go.mod go.sum
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: checkout repo
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: install root dependencies
        run: npm install
        working-directory: .

      - name: install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: ensure output directories exist
        run: mkdir -p internal/api

      - name: generate code
        run: npm run codegen
        working-directory: .

      - name: run go test
        run: go test ./...
