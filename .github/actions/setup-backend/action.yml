name: setup backend
description: setup Go, Node, install deps, and generate backend code
runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: backend/go.mod

    - uses: actions/setup-node@v4
      with:
        node-version: '25'

    - name: install root dependencies
      run: npm install
      shell: bash
      working-directory: .

    - name: ensure output directories exist
      run: mkdir -p internal/api
      shell: bash
      working-directory: backend

    - name: generate code
      run: npm run codegen:gen:bundle && npm run codegen:gen:backend
      shell: bash
      working-directory: .
