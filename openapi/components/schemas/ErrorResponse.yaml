type: object
required:
  - code
  - message
properties:
  code:
    type: string
    description: "A machine-readable error code identifying the type of error (e.g., 'EMAIL_ALREADY_EXISTS', 'VALIDATION_FAILED')."
  message:
    type: string
    description: "A human-readable description of the error."
  details:
    type: array
    description: "Optional list of validation errors per field."
    items:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: "The request body field that caused the validation error."
        message:
          type: string
          description: "Description of the validation failure for this field."
