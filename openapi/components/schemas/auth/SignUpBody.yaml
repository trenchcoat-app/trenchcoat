type: object
required:
  - email
  - password
  - displayName
properties:
  email:
    type: string
    format: email
  password:
    type: string
    format: password
  displayName:
    type: string
  autoSignIn:
    type: boolean
    default: false
    description: "Specifies whether to automatically sign in and create a session for the account upon successful registration."
